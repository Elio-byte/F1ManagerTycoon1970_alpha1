<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>F1 Manager Tycoon 1970-1980</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #1a1a1a; color: #fff; }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #ff0000; padding: 20px 0; margin-bottom: 20px; }
    header h1 { font-size: 2em; color: #ff0000; }
    select { padding: 8px 12px; border-radius: 4px; border: 1px solid #ff0000; background: #222; color: #fff; cursor: pointer; }
    button { padding: 10px 20px; border: none; border-radius: 4px; background: #ff0000; color: #fff; cursor: pointer; font-size: 1em; transition: 0.3s; margin: 5px; }
    button:hover { background: #cc0000; }
    .card { background: #222; border: 2px solid #ff0000; border-radius: 8px; padding: 20px; margin: 20px 0; }
    input { width: 100%; padding: 10px; border: 1px solid #ff0000; border-radius: 4px; background: #222; color: #fff; font-size: 1em; margin: 5px 0; }
    .form-group { margin: 15px 0; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    .leaderboard { list-style: none; }
    .leaderboard li { padding: 10px; border-bottom: 1px solid #444; display: flex; justify-content: space-between; }
    .leaderboard li:first-child { background: #333; border-left: 4px solid #ffd700; }
    .event-log { background: #000; border: 1px solid #444; border-radius: 4px; padding: 10px; height: 150px; overflow-y: auto; }
    .event { padding: 5px 0; font-size: 0.9em; border-bottom: 1px solid #333; color: #aaa; }
    .decision-buttons { display: flex; gap: 10px; margin: 20px 0; }
    .decision-buttons button { flex: 1; }
    .center { text-align: center; }
    .hidden { display: none; }
    .race-map { width: 100%; height: 250px; border: 2px solid #ff0000; border-radius: 8px; background: #000; margin: 10px 0; }
    .warning { background:#3a1a1a;color:#ffb86b;padding:8px;border-radius:6px;margin:12px 0;border:1px solid #ffb86b }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🏁 F1 Manager Tycoon 1970-1980</h1>
      <div>
        <label>Language:</label>
        <select id="lang" onchange="changeLang(this.value)">
          <option value="en">English</option>
          <option value="es">Español</option>
        </select>
      </div>
    </header>
    <div id="app"></div>
  </div>

  <!-- Load Socket.IO client from CDN (fallback to prevent blocking if unavailable) -->
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
const API = window.location.origin;
const translations = {
  en: {
    login: 'Login / Register',
    email: 'Email',
    password: 'Password',
    register: 'Register',
    login_btn: 'Login',
    createTeam: 'Create Team',
    teamName: 'Team Name',
    color: 'Team Color',
    create: 'Create',
    startRace: 'Start Race',
    circuit: 'Circuit Name (e.g., Monaco)',
    raceMap: 'RACE MAP',
    leaderboard: 'LEADERBOARD',
    events: 'EVENTS',
    position: 'POS',
    reliability: 'REL%',
    status: 'STATUS',
    push: 'PUSH (aggressive)',
    conserve: 'CONSERVE (save engine)',
    pit: 'PIT NOW',
    lap: 'LAP',
    raceFinished: 'RACE FINISHED!'
  },
  es: {
    login: 'Iniciar Sesión / Registrarse',
    email: 'Correo',
    password: 'Contraseña',
    register: 'Registrarse',
    login_btn: 'Iniciar Sesión',
    createTeam: 'Crear Equipo',
    teamName: 'Nombre del Equipo',
    color: 'Color del Equipo',
    create: 'Crear',
    startRace: 'Iniciar Carrera',
    circuit: 'Nombre del Circuito (ej: Mónaco)',
    raceMap: 'MAPA DE CARRERA',
    leaderboard: 'CLASIFICACIÓN',
    events: 'EVENTOS',
    position: 'POS',
    reliability: 'CON%',
    status: 'ESTADO',
    push: 'EMPUJAR (agresivo)',
    conserve: 'CONSERVAR (ahorrar motor)',
    pit: 'BOXEAR AHORA',
    lap: 'VUELTA',
    raceFinished: '¡CARRERA TERMINADA!'
  }
};

let lang = localStorage.getItem('lang') || 'en';
let token = localStorage.getItem('token');
let userId = localStorage.getItem('userId');
let teamId = localStorage.getItem('teamId');
let carId = localStorage.getItem('carId');
let raceActive = false;
let raceData = { cars: [], events: [], lap: 0 };
let socket = null;
let socketConnected = false;
let pollInterval = null;

// Initialize socket safely
(function initSocket(){
  if (typeof io === 'undefined') {
    console.warn('Socket.IO client not loaded from CDN');
    socket = null;
    return;
  }
  try {
    socket = io();
    socket.on('connect', () => { socketConnected = true; console.log('[Socket] connected', socket.id); stopPolling(); render(); });
    socket.on('connect_error', (err) => { console.warn('[Socket] connect_error', err); startPolling(); });
  } catch (e) {
    console.warn('Socket init failed', e);
    socket = null;
    startPolling();
  }
})();

applyingSocketHandlers();

function applyingSocketHandlers(){
  if (!socket) return;
  socket.on('race:lap', (data) => {
    // ignore if this is a different race
    if (raceData.raceId && data.raceId && data.raceId !== raceData.raceId) return;
    raceData.lap = data.lap;
    raceData.cars = data.cars;
    render();
  });

  socket.on('race:event', (data) => {
    if (raceData.raceId && data.raceId && data.raceId !== raceData.raceId) return;
    if (!raceData.events) raceData.events = [];
    const msg = `Lap ${data.lap}: ${data.team} - ${data.type}`;
    raceData.events.unshift(msg);
    if (raceData.events.length > 8) raceData.events.pop();
    render();
  });

  socket.on('race:end', (data) => {
    if (raceData.raceId && data.raceId && data.raceId !== raceData.raceId) return;
    raceActive = false;
    raceData.cars = data.cars;
    stopPolling();
    render();
  });
}

function startPolling() {
  if (pollInterval) return;
  if (!raceData.raceId) return;
  pollInterval = setInterval(async () => {
    try {
      const res = await fetch(API + '/api/race/' + raceData.raceId + '/status');
      if (!res.ok) return;
      const json = await res.json();
      raceData.lap = json.lap;
      raceData.cars = json.cars;
      // convert events to strings for display if needed
      if (json.events) {
        raceData.events = json.events.map(e => `Lap ${e.lap}: ${e.team} - ${e.type}`);
      }
      render();
    } catch (e) {
      console.warn('Polling failed', e);
    }
  }, 1500);
}

function stopPolling() {
  if (pollInterval) {
    clearInterval(pollInterval);
    pollInterval = null;
  }
}

function t(key) {
  return translations[lang]?.[key] || key;
}

function changeLang(l) {
  lang = l;
  localStorage.setItem('lang', lang);
  render();
}

async function register() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  try {
    const res = await fetch(API + '/api/auth/register', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ email, password, language: lang })
    });
    const json = await res.json();
    if (json.token) {
      token = json.token;
      userId = json.user.id;
      localStorage.setItem('token', token);
      localStorage.setItem('userId', userId);
      render();
    } else {
      alert(json.error || 'Registration failed');
    }
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  try {
    const res = await fetch(API + '/api/auth/login', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const json = await res.json();
    if (json.token) {
      token = json.token;
      userId = json.user.id;
      localStorage.setItem('token', token);
      localStorage.setItem('userId', userId);
      render();
    } else {
      alert(json.error || 'Login failed');
    }
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function createTeam() {
  const name = document.getElementById('teamName').value;
  const color = document.getElementById('color').value;
  try {
    const res = await fetch(API + '/api/team/create', {
      method: 'POST',
      headers: { 'authorization': 'Bearer ' + token, 'content-type': 'application/json' },
      body: JSON.stringify({ name, colorPrimary: color })
    });
    const json = await res.json();
    if (json.team) {
      teamId = json.team.id;
      carId = json.car.id;
      localStorage.setItem('teamId', teamId);
      localStorage.setItem('carId', carId);
      render();
    } else {
      alert(json.error || 'Failed to create team');
    }
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function startRace() {
  const circuit = document.getElementById('circuit').value || 'Monaco';
  try {
    const res = await fetch(API + '/api/race/start', {
      method: 'POST',
      headers: { 'authorization': 'Bearer ' + token, 'content-type': 'application/json' },
      body: JSON.stringify({ carId, circuitName: circuit, year: 1975 })
    });
    const json = await res.json();
    if (json.raceId) {
      raceActive = true;
      raceData = { cars: [], events: [], lap: 0, raceId: json.raceId };
      // if sockets are unavailable, start polling
      if (!socket || !socketConnected) startPolling();
      render();
    } else {
      alert(json.error || 'Failed to start race');
    }
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

async function makeDecision(decision) {
  try {
    if (!raceData.raceId) return;
    await fetch(API + '/api/race/' + raceData.raceId + '/decision', {
      method: 'POST',
      headers: { 'authorization': 'Bearer ' + token, 'content-type': 'application/json' },
      body: JSON.stringify({ decision })
    });
  } catch (e) {
    console.error(e);
  }
}

// Socket handlers are registered above; older code used socket var directly — guarded now

function render() {
  const app = document.getElementById('app');
  let html = '';

  // Show connection warning if socket is unavailable
  const connWarning = (!socket || !socketConnected) ? `<div class="warning">Real-time updates unavailable (socket disconnected). The game still works but updates may be delayed; try the Lite page if your connection is slow.</div>` : '';

  if (!token) {
    html = `
      <div class="card center">
        <h2>${t('login')}</h2>
        ${connWarning}
        <div class="form-group">
          <label>${t('email')}</label>
          <input type="email" id="email" placeholder="test@example.com" />
        </div>
        <div class="form-group">
          <label>${t('password')}</label>
          <input type="password" id="password" placeholder="••••••" />
        </div>
        <button onclick="login()">${t('login_btn')}</button>
        <button onclick="register()" style="background:#00aa00;">${t('register')}</button>
      </div>
    `;
  } else if (!teamId) {
    html = `
      <div class="card center">
        <h2>${t('createTeam')}</h2>
        ${connWarning}
        <div class="form-group">
          <label>${t('teamName')}</label>
          <input type="text" id="teamName" placeholder="Ferrari" />
        </div>
        <div class="form-group">
          <label>${t('color')}</label>
          <input type="color" id="color" value="#FF0000" />
        </div>
        <button onclick="createTeam()">${t('create')}</button>
        <button onclick="logout()" style="background:#888;">Logout</button>
      </div>
    `;
  } else if (!raceActive) {
    html = `
      <div class="card center">
        <h2>${t('startRace')}</h2>
        ${connWarning}
        <div class="form-group">
          <label>${t('circuit')}</label>
          <input type="text" id="circuit" placeholder="Monaco" />
        </div>
        <button onclick="startRace()" style="width:100%; font-size:1.2em;">${t('startRace')}</button>
        <button onclick="logout()" style="width:100%; background:#888;">Logout</button>
      </div>
    `;
  } else {
    html = `
      <div class="card">
        <h3 style="text-align:center; font-size:1.5em;">${t('lap')} <span style="color:#ffd700;">${raceData.lap || 0}</span> / 20</h3>
        ${connWarning}
        <svg class="race-map" viewBox="0 0 1000 200" preserveAspectRatio="none">
          <path d="M20 100 Q 200 20 400 100 T 980 100" stroke="#888" stroke-width="8" fill="none" />
          ${raceData.cars ? raceData.cars.map((c, i) => `<circle cx="${20 + (i * 250)}" cy="${100 + Math.sin(i) * 50}" r="10" fill="${['#FF0000', '#0088FF', '#00FF00', '#FFFF00'][i]}" stroke="#fff" stroke-width="2" />`).join('') : ''}
        </svg>
        <h3>${t('leaderboard')}</h3>
        <ul class="leaderboard">
          ${raceData.cars ? raceData.cars.map(c => `<li><strong style="color:${['#ffd700', '#c0c0c0', '#cd7f32', '#999'][c.position-1] || '#fff'}">${c.position}. ${c.team}</strong> <span>${c.reliability}% | ${c.status}</span></li>`).join('') : ''}
        </ul>
        <div class="decision-buttons">
          <button onclick="makeDecision('push')" style="background:#ff4444;">${t('push')}</button>
          <button onclick="makeDecision('conserve')" style="background:#4444ff;">${t('conserve')}</button>
          <button onclick="makeDecision('pit')" style="background:#ffaa00;">${t('pit')}</button>
        </div>
        <h3>${t('events')}</h3>
        <div class="event-log">
          ${raceData.events && raceData.events.length > 0 ? raceData.events.map(e => `<div class="event">⚠️ ${e}</div>`).join('') : '<div class="event" style="color:#666;">Waiting for events...</div>'}
        </div>
      </div>
    `;
  }

  app.innerHTML = html;
}

function logout() {
  token = null;
  userId = null;
  teamId = null;
  carId = null;
  localStorage.clear();
  location.reload();
}

render();
  </script>
</body>
</html>
